- name: Fetch source pull request head
    env:
      SOURCE_FETCH_TOKEN: ${{ secrets.CHERRY_PICK_SOURCE_REPO_TOKEN }}
    run: |
      set -euo pipefail

      echo "source_owner=${{ inputs.source_owner }}"
      echo "source_repo=${{ inputs.source_repo }}"
      echo "source_branch=${{ inputs.source_branch }}"

      if [ -z "$SOURCE_FETCH_TOKEN" ]; then
        echo "Missing CHERRY_PICK_SOURCE_REPO_TOKEN"
        exit 1
      fi

      echo "Checking API access..."
      curl -i -sS \
        -H "Authorization: Bearer $SOURCE_FETCH_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/${{ inputs.source_owner }}/${{ inputs.source_repo }}

      echo
      echo "Checking git access..."
      git ls-remote "https://x-access-token:${SOURCE_FETCH_TOKEN}@github.com/${{ inputs.source_owner }}/${{ inputs.source_repo }}.git" HEAD

      git remote add source "https://x-access-token:${SOURCE_FETCH_TOKEN}@github.com/${{ inputs.source_owner }}/${{ inputs.source_repo }}.git"
      git fetch --no-tags source "${{ inputs.source_branch }}:refs/remotes/source/${{ inputs.source_branch }}"

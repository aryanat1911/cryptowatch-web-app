name: "Cherry Pick Pull Request"

run-name: "Cherry-pick PR set ${{ inputs.source_pull_numbers }} into ${{ inputs.target_branch }}"

"on":
  workflow_dispatch:
    inputs:
      source_owner:
        description: "Source repository owner"
        required: true
        type: string
      source_repo:
        description: "Source repository name"
        required: true
        type: string
      source_pull_numbers:
        description: "Comma-separated source pull request numbers"
        required: true
        type: string
      source_primary_branch:
        description: "Primary source branch used for the initial checkout"
        required: true
        type: string
      source_branches:
        description: "Comma-separated source branches referenced by the selected pull requests"
        required: true
        type: string
      target_branch:
        description: "Target branch to cherry-pick onto"
        required: true
        type: string
      target_owner:
        description: "Target repository owner"
        required: true
        type: string
      target_repo:
        description: "Target repository name"
        required: true
        type: string
      new_branch_name:
        description: "New branch to create for the cherry-pick"
        required: true
        type: string
      commit_shas:
        description: "Comma-separated commit shas"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Create target repository app token"
        id: "target_app_token"
        uses: "actions/create-github-app-token@v2"
        with:
          app-id: "${{ vars.CHERRY_PICK_APP_ID }}"
          private-key: "${{ secrets.CHERRY_PICK_APP_PRIVATE_KEY }}"
          owner: "${{ inputs.target_owner }}"
          repositories: "${{ inputs.target_repo }}"

      - name: "Create source repository app token"
        id: "source_app_token"
        uses: "actions/create-github-app-token@v2"
        with:
          app-id: "${{ vars.CHERRY_PICK_APP_ID }}"
          private-key: "${{ secrets.CHERRY_PICK_APP_PRIVATE_KEY }}"
          owner: "${{ inputs.source_owner }}"
          repositories: "${{ inputs.source_repo }}"

      - name: "Checkout target branch"
        uses: "actions/checkout@v4"
        with:
          ref: "${{ inputs.target_branch }}"
          fetch-depth: 0
          repository: "${{ inputs.target_owner }}/${{ inputs.target_repo }}"
          token: "${{ steps.target_app_token.outputs.token }}"
          persist-credentials: true

      - name: "Validate GitHub App tokens"
        env:
          TARGET_FETCH_TOKEN: "${{ steps.target_app_token.outputs.token }}"
          SOURCE_FETCH_TOKEN: "${{ steps.source_app_token.outputs.token }}"
        run: |
          set -euo pipefail

          if [ -z "${TARGET_FETCH_TOKEN:-}" ]; then
            {
              echo "## Cherry-pick failed"
              echo ""
              echo "Unable to create a GitHub App token for the target repository."
              echo ""
              echo "Confirm the GitHub App is installed on \`${{ inputs.target_owner }}/${{ inputs.target_repo }}\` and that \`CHERRY_PICK_APP_ID\` and \`CHERRY_PICK_APP_PRIVATE_KEY\` are configured in the target repo."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ -z "${SOURCE_FETCH_TOKEN:-}" ]; then
            {
              echo "## Cherry-pick failed"
              echo ""
              echo "Unable to create a GitHub App token for the source repository."
              echo ""
              echo "Confirm the GitHub App is installed on \`${{ inputs.source_owner }}/${{ inputs.source_repo }}\` and that \`CHERRY_PICK_APP_ID\` and \`CHERRY_PICK_APP_PRIVATE_KEY\` are configured in the target repo."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: "Checkout source repository"
        uses: "actions/checkout@v4"
        with:
          repository: "${{ inputs.source_owner }}/${{ inputs.source_repo }}"
          ref: "${{ inputs.source_primary_branch }}"
          token: "${{ steps.source_app_token.outputs.token }}"
          fetch-depth: 0
          path: ".source-repo"
          persist-credentials: true

      - name: "Fetch source branches into target repo"
        run: |
          set -euo pipefail

          echo "source_owner=${{ inputs.source_owner }}"
          echo "source_repo=${{ inputs.source_repo }}"
          echo "source_pull_numbers=${{ inputs.source_pull_numbers }}"
          echo "source_branches=${{ inputs.source_branches }}"

          IFS=',' read -r -a source_branches <<< "${{ inputs.source_branches }}"

          for branch in "${source_branches[@]}"; do
            [ -z "$branch" ] && continue
            git -C "$GITHUB_WORKSPACE/.source-repo" fetch --no-tags origin "${branch}:refs/remotes/origin/${branch}"
          done

          git remote add source "$GITHUB_WORKSPACE/.source-repo"

          for branch in "${source_branches[@]}"; do
            [ -z "$branch" ] && continue
            git fetch --no-tags source "refs/remotes/origin/${branch}:refs/remotes/source/${branch}"
          done

          git remote remove source
          rm -rf "$GITHUB_WORKSPACE/.source-repo"

      - name: "Configure git identity"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: "Create working branch"
        run: |
          git switch -c "${{ inputs.new_branch_name }}"

      - name: "Cherry-pick commits"
        id: "cherry_pick"
        env:
          COMMIT_SHAS: "${{ inputs.commit_shas }}"
        run: |
          set -euo pipefail
          IFS=',' read -r -a commits <<< "$COMMIT_SHAS"
          duplicates=()
          applied=()
          conflict_detected=false
          conflicting_commit=""
          conflicting_subject=""
          conflicted_files=""

          for sha in "${commits[@]}"; do
            if ! git cat-file -e "$sha^{commit}" 2>/dev/null; then
              echo "missing_commit=$sha" >> "$GITHUB_OUTPUT"
              {
                echo "## Cherry-pick failed"
                echo ""
                echo "Commit not available locally: \`$sha\`"
                echo ""
                echo "The workflow fetched the source repository branch but still could not resolve this commit."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            if git merge-base --is-ancestor "$sha" HEAD; then
              duplicates+=("$sha")
              continue
            fi

            if git cherry-pick -x "$sha"; then
              applied+=("$sha")
            else
              conflicted_files="$(git diff --name-only --diff-filter=U || true)"
              conflicting_subject="$(git log -1 --format=%s "$sha" 2>/dev/null || true)"
              git status --short
              git cherry-pick --abort || true
              conflict_detected=true
              conflicting_commit="$sha"
              echo "conflicting_commit=$sha" >> "$GITHUB_OUTPUT"

              break
            fi
          done

          echo "has_conflict=$conflict_detected" >> "$GITHUB_OUTPUT"
          echo "conflicting_subject=$conflicting_subject" >> "$GITHUB_OUTPUT"
          echo "applied_commits=$(IFS=,; echo "${applied[*]}")" >> "$GITHUB_OUTPUT"
          echo "duplicate_commits=$(IFS=,; echo "${duplicates[*]}")" >> "$GITHUB_OUTPUT"
          {
            echo "conflicted_files<<EOF"
            printf '%s\n' "$conflicted_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "${#applied[@]}" -eq 0 ]; then
            echo "No new commits to cherry-pick."
            echo "applied_count=0" >> "$GITHUB_OUTPUT"
          else
            echo "applied_count=${#applied[@]}" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "## Cherry-pick summary"
            echo ""
            echo "Applied commits:"
            if [ "${#applied[@]}" -gt 0 ]; then
              printf -- "- %s\n" "${applied[@]}"
            else
              echo "- none"
            fi
            echo ""
            echo "Duplicate commits skipped:"
            if [ "${#duplicates[@]}" -gt 0 ]; then
              printf -- "- %s\n" "${duplicates[@]}"
            else
              echo "- none"
            fi
            if [ "$conflict_detected" = true ]; then
              echo ""
              echo "Stopped on conflicting commit: \`$conflicting_commit\`"
              if [ -n "$conflicting_subject" ]; then
                echo ""
                echo "Conflicting commit subject: $conflicting_subject"
              fi
              echo ""
              echo "Conflicted files:"
              if [ -n "$conflicted_files" ]; then
                while IFS= read -r file; do
                  [ -n "$file" ] && printf -- "- %s\n" "$file"
                done <<< "$conflicted_files"
              else
                echo "- unknown"
              fi
              echo ""
              if [ "${#applied[@]}" -eq 0 ]; then
                echo "No commits were applied before the conflict."
                echo "A draft pull request will be opened with a generated conflict report commit."
              else
                echo "A draft pull request will be opened for the successfully applied commits."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Create conflict handoff commit"
        if: "${{ steps.cherry_pick.outputs.has_conflict == 'true' && steps.cherry_pick.outputs.applied_count == '0' }}"
        env:
          CONFLICTING_COMMIT: "${{ steps.cherry_pick.outputs.conflicting_commit }}"
          CONFLICTING_SUBJECT: "${{ steps.cherry_pick.outputs.conflicting_subject }}"
          CONFLICTED_FILES: "${{ steps.cherry_pick.outputs.conflicted_files }}"
        run: |
          set -euo pipefail

          mkdir -p .github
          cat > .github/cherry-pick-conflict-report.md <<EOF
          # Cherry-pick conflict report

          Source repository: ${{ inputs.source_owner }}/${{ inputs.source_repo }}
          Source pull requests: ${{ inputs.source_pull_numbers }}
          Source branches: ${{ inputs.source_branches }}
          Target repository: ${{ inputs.target_owner }}/${{ inputs.target_repo }}
          Target branch: ${{ inputs.target_branch }}

          Conflicting commit: $CONFLICTING_COMMIT
          Conflicting subject: $CONFLICTING_SUBJECT

          Conflicted files:
          EOF

          if [ -n "$CONFLICTED_FILES" ]; then
            while IFS= read -r file; do
              [ -n "$file" ] && printf -- "- %s\n" "$file" >> .github/cherry-pick-conflict-report.md
            done <<< "$CONFLICTED_FILES"
          else
            echo "- unknown" >> .github/cherry-pick-conflict-report.md
          fi

          cat >> .github/cherry-pick-conflict-report.md <<EOF

          Manual resolution is required. This branch was created so a draft pull request can be opened even though the cherry-pick stopped on the first conflicting commit.
          EOF

          git add .github/cherry-pick-conflict-report.md
          git commit -m "Add cherry-pick conflict report"

      - name: "Push branch"
        if: "${{ steps.cherry_pick.outputs.applied_count != '0' || steps.cherry_pick.outputs.has_conflict == 'true' }}"
        run: |
          if git ls-remote --exit-code --heads origin "${{ inputs.new_branch_name }}" >/dev/null 2>&1; then
            {
              echo "## Cherry-pick failed"
              echo ""
              echo "Remote branch already exists: \`${{ inputs.new_branch_name }}\`"
              echo ""
              echo "Re-run the cherry-pick to generate a fresh branch name."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          git push --set-upstream origin "${{ inputs.new_branch_name }}"

      - name: "Create pull request"
        if: "${{ steps.cherry_pick.outputs.applied_count != '0' || steps.cherry_pick.outputs.has_conflict == 'true' }}"
        uses: "actions/github-script@v7"
        with:
          github-token: "${{ steps.target_app_token.outputs.token }}"
          script: |
            const appliedCommits = (process.env.APPLIED_COMMITS || "").split(",").filter(Boolean);
            const duplicateCommits = (process.env.DUPLICATE_COMMITS || "").split(",").filter(Boolean);
            const conflictedFiles = (process.env.CONFLICTED_FILES || "").split("\n").filter(Boolean);
            const sourcePullNumbers = "${{ inputs.source_pull_numbers }}".split(",").filter(Boolean);
            const hasConflict = process.env.HAS_CONFLICT === "true";
            const appliedCount = Number(process.env.APPLIED_COUNT || "0");
            const title = sourcePullNumbers.length === 1
              ? `Cherry-pick PR #${sourcePullNumbers[0]} into ${{ inputs.target_branch }}`
              : `Cherry-pick PR set (${sourcePullNumbers.join(", ")}) into ${{ inputs.target_branch }}`;
            const bodyLines = [
              `Automated cherry-pick of commits from ${{ inputs.source_owner }}/${{ inputs.source_repo }}`,
              ``,
              `Source repository: \`${{ inputs.source_owner }}/${{ inputs.source_repo }}\``,
              `Source pull requests: ${sourcePullNumbers.map((pullNumber) => `#${pullNumber}`).join(", ")}`,
              `Source branches: \`${{ inputs.source_branches }}\``,
              `Target branch: \`${{ inputs.target_branch }}\``
            ];

            bodyLines.push("", "Applied commits:");
            if (appliedCommits.length > 0) {
              bodyLines.push(...appliedCommits.map((sha) => `- \`${sha}\``));
            } else {
              bodyLines.push("- none");
            }

            bodyLines.push("", "Duplicate commits skipped:");
            if (duplicateCommits.length > 0) {
              bodyLines.push(...duplicateCommits.map((sha) => `- \`${sha}\``));
            } else {
              bodyLines.push("- none");
            }

            if (hasConflict) {
              bodyLines.push("", `Stopped on conflicting commit: \`${process.env.CONFLICTING_COMMIT}\``);
              if (process.env.CONFLICTING_SUBJECT) {
                bodyLines.push(`Conflicting subject: ${process.env.CONFLICTING_SUBJECT}`);
              }

              bodyLines.push("", "Conflicted files:");
              if (conflictedFiles.length > 0) {
                bodyLines.push(...conflictedFiles.map((file) => `- \`${file}\``));
              } else {
                bodyLines.push("- unknown");
              }

              if (appliedCount === 0) {
                bodyLines.push("", "No source commits were applied before the conflict.");
                bodyLines.push("A placeholder conflict report commit was added so this draft PR could be created.");
                bodyLines.push("See `.github/cherry-pick-conflict-report.md` in this branch for the recorded conflict details.");
              } else {
                bodyLines.push("", "Manual resolution is required before this branch is ready to merge.");
              }
            }

            const body = bodyLines.join("\n");

            const response = await github.rest.pulls.create({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              title,
              head: "${{ inputs.new_branch_name }}",
              base: "${{ inputs.target_branch }}",
              body,
              draft: hasConflict
            });

            await core.summary.addRaw(`Created PR: ${response.data.html_url}`).write();
        env:
          APPLIED_COMMITS: "${{ steps.cherry_pick.outputs.applied_commits }}"
          DUPLICATE_COMMITS: "${{ steps.cherry_pick.outputs.duplicate_commits }}"
          CONFLICTING_COMMIT: "${{ steps.cherry_pick.outputs.conflicting_commit }}"
          CONFLICTING_SUBJECT: "${{ steps.cherry_pick.outputs.conflicting_subject }}"
          CONFLICTED_FILES: "${{ steps.cherry_pick.outputs.conflicted_files }}"
          HAS_CONFLICT: "${{ steps.cherry_pick.outputs.has_conflict }}"
          APPLIED_COUNT: "${{ steps.cherry_pick.outputs.applied_count }}"
